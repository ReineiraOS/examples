name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false --ignore-scripts
      - run: pnpm prettier --check "**/*.{ts,tsx,js,jsx,mjs,cjs,json,md,mdx,yml,yaml}" --ignore-path .prettierignore
